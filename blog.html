      border-radius: 8px;

    }

      background: var(--teal);
      color: #fff;
      text-decoration: none;

      background: var(--teal-pale);

      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);

    .blog-card:hover {

      box-shadow: var(--shadow-lg);
      border-color: var(--teal-light);
    }
    
    .card-image {

      background: linear-gradient(135deg, var(--amber-pale), var(--teal-pale));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      border-bottom: 2px solid var(--border);
    }
    
    .card-content {
      padding: 24px 24px 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;

      display: inline-block;
      padding: 3px 12px;
      border-radius: 50px;
      width: fit-content;
      margin-bottom: 14px;

      line-height: 1.3;
      margin-bottom: 12px;

      margin: 40px auto 0;
      padding: 0 24px;

      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;

      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 60px;
      padding: 8px 18px;

    .search-box span {
      font-size: 1rem;
    }

      background: transparent;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      color: var(--ink);

      gap: 12px;
      flex-wrap: wrap;
    }

      font-size: 0.8rem;
      padding: 6px 16px;
      border-radius: 50px;
      background: var(--paper);
      border: 1.5px solid var(--border);
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-chip.active {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
    }
    
    .filter-chip:hover:not(.active) {
      background: var(--amber-pale);
      border-color: var(--amber-light);
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      background: var(--cream);
      border-radius: var(--radius);
      margin: 40px auto;
      max-width: 500px;
    }
    
    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    /* Footer */
    .blog-footer {
      background: var(--ink);
      color: #ccc;
      text-align: center;
      padding: 32px 20px;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      margin-top: 40px;
    }
    
    .blog-footer a {
      color: var(--amber-light);
      text-decoration: none;
    }
    
    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      padding: 8px 20px;
      border-radius: 50px;
      z-index: 9999;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    
    @media (max-width: 700px) {
      .blog-grid {
        padding: 40px 16px;
        gap: 24px;
      }
      .blog-toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .filter-buttons {
        justify-content: center;
      }
      .nav-links {
        display: none;
      }
      .blog-hero {
        padding: calc(var(--header-h) + 24px) 20px 32px;
      }
    }
    
    /* scroll animation */
    [data-animate] {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    [data-animate].animated {
      opacity: 1;
      transform: none;
    }
  </style>
</head>
<body>

<main>

  // Render cards to DOM
  const gridContainer = document.getElementById('blogGrid');
  const searchInput = document.getElementById('searchInput');
  let activeFilter = 'all';
  
  function renderPosts() {
    const searchTerm = searchInput.value.toLowerCase().trim();
    let filteredPosts = [...blogPosts];
    
    // filter by category
    if (activeFilter !== 'all') {
      filteredPosts = filteredPosts.filter(post => post.category === activeFilter);
    }
    
    // filter by search (title + excerpt)
    if (searchTerm) {
      filteredPosts = filteredPosts.filter(post => 
        post.title.toLowerCase().includes(searchTerm) || 
        post.excerpt.toLowerCase().includes(searchTerm) ||
        post.tags.some(tag => tag.includes(searchTerm))
      );
    }
    
    if (filteredPosts.length === 0) {
      gridContainer.innerHTML = `<div class="empty-state" data-animate><div class="emoji">🔍📭</div><h3 style="font-family:var(--font-display);">No matching articles</h3><p>Try adjusting your search or filter to find more memo tips.</p></div>`;
      return;
    }

      <article class="blog-card" data-post-id="${post.id}" data-category="${post.category}" data-animate>
        <div class="card-image">
          <span style="font-size: 3rem;">${post.icon}</span>
        </div>
        <div class="card-content">
          <span class="card-category">${post.category === 'privacy' ? '🔒 Privacy' : post.category === 'productivity' ? '⚡ Productivity' : post.category === 'organization' ? '🎨 Organization' : '💡 Pro Tips'}</span>
          <h3>${escapeHtml(post.title)}</h3>
          <p class="blog-excerpt">${escapeHtml(post.excerpt)}</p>
          <span class="read-more">Read full article →</span>
        </div>
      </article>
    `).join('');
    
    // attach click handlers to each card
    document.querySelectorAll('.blog-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.read-more') || e.target.closest('.blog-card')) {
          const id = parseInt(card.getAttribute('data-post-id'));
          const post = blogPosts.find(p => p.id === id);
          if (post) {
            showToast(`Opening: ${post.title}`);
            // simulate dynamic article page: open in new tab (blob)
            const articleHTML = generateArticleHTML(post);
            const blob = new Blob([articleHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }
        }
      });
    });
    
    // trigger scroll animation
    setTimeout(() => {
      document.querySelectorAll('[data-animate]').forEach(el => {
        if (!el.classList.contains('animated')) el.classList.add('animated');
      });
    }, 50);
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  }
  
  // Event listeners
  searchInput.addEventListener('input', () => renderPosts());
  
  // filter chips
  const filterChips = document.querySelectorAll('.filter-chip');
  filterChips.forEach(chip => {
    chip.addEventListener('click', () => {
      filterChips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.getAttribute('data-filter');
      renderPosts();
    });
  });
  
  // Lazy animation on load
  window.addEventListener('DOMContentLoaded', () => {
    renderPosts();
    
    // add header scroll effect
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
    
    // scroll animation observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animated');
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-animate]').forEach(el => observer.observe(el));
  });
</script>
</body>
</html>

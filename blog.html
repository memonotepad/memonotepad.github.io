<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Memo Notepad Blog | Articles & Tips for Digital Note-Taking</title>
  
  <!-- SEO & Meta -->
  <meta name="description" content="Explore the official Memo Notepad blog: privacy guides, productivity hacks, color-coding systems, and expert tips for your online memo notepad." />
  <meta name="keywords" content="memo notepad blog, online notepad tips, memo pads online, note taking productivity, private memo app, Memo Notepad articles" />
  <meta name="author" content="MemoNotepad" />
  <link rel="canonical" href="https://memonotepad.github.io/blog" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <meta name="robots" content="index, follow" />
  
  <!-- Open Graph / Social -->
  <meta property="og:title" content="Memo Notepad Blog — Write Smarter with Private Notes" />
  <meta property="og:description" content="Master your memo notepad: privacy, shortcuts, creative workflows, and expert organization strategies." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://memonotepad.github.io/blog" />
  <meta property="og:image" content="https://memonotepad.github.io/og-blog.png" />
  
  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ===== GLOBAL DESIGN TOKENS (matching main site) ===== */
    :root {
      --cream: #fdfaf3;
      --paper: #fffef9;
      --ink: #2c2416;
      --ink-light: #5a4f3e;
      --ink-muted: #9e9080;
      --amber: #f0a500;
      --amber-light: #fcd270;
      --amber-pale: #fff7e0;
      --teal: #2a8f7f;
      --teal-light: #4cbaa8;
      --teal-pale: #e0f5f2;
      --coral: #e05c3a;
      --border: #e8dfc8;
      --border-dark: #d0c4a8;
      --shadow-sm: 0 2px 8px rgba(44,36,22,.07);
      --shadow-md: 0 6px 24px rgba(44,36,22,.12);
      --shadow-lg: 0 12px 40px rgba(44,36,22,.16);
      --radius: 12px;
      --radius-lg: 20px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Serif 4', 'Georgia', serif;
      --font-ui: 'DM Sans', system-ui, sans-serif;
      --header-h: 68px;
      --transition: 200ms ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      font-family: var(--font-body);
      color: var(--ink);
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    /* paper texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(200,190,160,.12) 27px, rgba(200,190,160,.12) 28px);
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    ::selection {
      background: var(--amber-light);
      color: var(--ink);
    }

    /* HEADER (replica from main site) */
    .site-header {
      position: sticky;
      top: 0;
      width: 100%;
      background: rgba(253,250,243,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      transition: box-shadow var(--transition);
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
    }
    .logo-icon { font-size: 1.6rem; }
    .logo-text strong { color: var(--teal); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .nav-link {
      font-family: var(--font-ui);
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 40px;
      color: var(--ink-light);
      transition: all var(--transition);
      text-decoration: none;
      font-weight: 500;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--amber-pale);
      color: var(--ink);
    }
    .nav-cta {
      background: var(--teal);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
    }
    .nav-cta:hover {
      background: var(--teal-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(42,143,127,.3);
      color: white;
    }
    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      margin-left: auto;
    }

    /* BLOG HERO */
    .blog-hero {
      background: linear-gradient(145deg, var(--teal-pale) 0%, var(--paper) 100%);
      padding: 64px 24px 56px;
      text-align: center;
      border-bottom: 1.5px solid var(--border);
    }
    .blog-hero .hero-badge {
      display: inline-block;
      background: var(--amber-pale);
      color: var(--teal);
      font-family: var(--font-ui);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 20px;
      border-radius: 50px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    .blog-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      margin-bottom: 16px;
    }
    .blog-hero p {
      font-size: 1.2rem;
      color: var(--ink-light);
      max-width: 620px;
      margin: 0 auto;
    }

    /* MAIN GRID (ARTICLES) */
    .blog-main {
      max-width: 1280px;
      margin: 60px auto;
      padding: 0 28px;
    }
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
    }
    .article-card {
      background: var(--paper);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      display: flex;
      flex-direction: column;
      height: 100%;
      box-shadow: var(--shadow-sm);
    }
    .article-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: var(--amber-light);
    }
    .card-content {
      padding: 28px 26px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .article-number {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--teal);
      background: var(--teal-pale);
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      width: fit-content;
      margin-bottom: 16px;
      letter-spacing: 0.3px;
    }
    .article-title {
      font-family: var(--font-display);
      font-size: 1.45rem;
      line-height: 1.3;
      margin-bottom: 14px;
      font-weight: 700;
      color: var(--ink);
    }
    .article-description {
      color: var(--ink-light);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 24px;
      flex: 1;
    }
    .read-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.9rem;
      background: transparent;
      border: 1.5px solid var(--border-dark);
      border-radius: 50px;
      padding: 8px 20px;
      color: var(--teal);
      text-decoration: none;
      transition: all 0.2s;
      width: fit-content;
      margin-top: 8px;
    }
    .read-link:hover {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
      transform: translateX(4px);
      box-shadow: var(--shadow-sm);
    }
    .read-link::after {
      content: "→";
      transition: transform 0.2s;
    }
    .read-link:hover::after {
      transform: translateX(4px);
    }

    /* SIDEBAR / EXTRA INFO */
    .blog-sidebar-note {
      max-width: 1100px;
      margin: 0 auto 60px;
      background: var(--amber-pale);
      border-radius: var(--radius);
      padding: 24px 32px;
      border-left: 5px solid var(--amber);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .sidebar-text p {
      font-family: var(--font-ui);
      color: var(--ink);
      font-weight: 500;
    }
    .btn-small {
      background: var(--teal);
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-family: var(--font-ui);
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-small:hover {
      background: var(--teal-light);
      transform: translateY(-2px);
    }

    /* PAGINATION (simple) */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 56px 0 40px;
    }
    .page-btn {
      font-family: var(--font-ui);
      background: var(--paper);
      border: 1.5px solid var(--border);
      padding: 8px 20px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 500;
      transition: all var(--transition);
    }
    .page-btn.active-page {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
    }
    .page-btn:hover:not(.disabled) {
      background: var(--amber-pale);
      border-color: var(--amber);
    }
    .page-btn.disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* FOOTER */
    .site-footer {
      background: var(--ink);
      color: #ccc;
      padding: 48px 24px 24px;
      margin-top: 40px;
    }
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      text-align: center;
    }
    .footer-logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: white;
    }
    .footer-logo strong { color: var(--amber); }
    .footer-copy {
      font-size: 0.85rem;
      font-family: var(--font-ui);
    }

    /* RESPONSIVE */
    @media (max-width: 780px) {
      .nav-links {
        display: none;
      }
      .mobile-toggle {
        display: block;
      }
      .articles-grid {
        grid-template-columns: 1fr;
      }
      .blog-hero {
        padding: 48px 20px 40px;
      }
      .blog-main {
        padding: 0 20px;
      }
    }
    @media (max-width: 550px) {
      .card-content {
        padding: 22px;
      }
      .article-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>


<!-- ══════════ HEADER ══════════ -->
<header id="site-header" role="banner"></header>

<!-- ========== BLOG HERO ========== -->
<section class="blog-hero">
  <div class="hero-badge">✨ Insights & tutorials</div>
  <h1>Memo Notepad <span style="color: var(--teal);">Blog</span></h1>
  <p>Deep dives into private note-taking, productivity hacks, and smart workflows — straight from the team behind the web's favorite memo pad.</p>
</section>

<!-- ========== ARTICLES SECTION ========== -->
<main class="blog-main">
  <div class="blog-sidebar-note">
    <div class="sidebar-text">
      <p>📚 10+ expert-written guides • Privacy-first • Boost your daily efficiency</p>
    </div>
    <a href="/#app" class="btn-small">✨ Try Memo Notepad Now</a>
  </div>

  <div id="articlesContainer" class="articles-grid">
    <!-- dynamic articles injected via JS from Topics.txt data -->
  </div>

  <!-- simple pagination controls (optional, but makes navigation nice) -->
  <div class="pagination" id="paginationControls">
    <!-- prev, next rendered via js -->
  </div>
</main>

<!-- ══════════ FOOTER ══════════ -->
<footer id="site-footer" role="contentinfo"></footer>

  <!-- ══════════ SCRIPTS ══════════ -->
<script src="js/header.js"></script>
<script src="js/footer.js"></script>

<script>
  // ========== ARTICLE DATASET (extracted from Memo notepad Topics.txt given in prompt) ==========
  // Titles + descriptions + article URLs (realistic permalinks for the blog)
  const articlesData = [
    {
      id: 1,
      title: "How Memo Notepad Keeps Your Notes 100% Private (No Servers, No Tracking)",
      description: "Discover why local-first storage matters: your memos never leave your browser. No accounts, no cloud vulnerabilities — complete privacy by design.",
      url: "/how-memo-notepad-keeps-notes-private"
    },
    {
      id: 2,
      title: "10 Creative Ways to Use Memo Notepad for Everyday Productivity",
      description: "From lightning-fast daily logs to project brainstorming, habit trackers and recipe vaults — unlock the full potential of your online memo pads.",
      url: "/10-creative-ways-to-use-memo-notepad"
    },
    {
      id: 3,
      title: "Mastering Color-Coded Memos: Build a Visual Organization System",
      description: "Transform your memo list into a vibrant dashboard: use color labels for urgency, context, and priority. Level up your visual workflow.",
      url: "/mastering-color-coded-memos"
    },
    {
      id: 4,
      title: "Why Browser-Based Note-Taking Apps Are the Future (And How Memo Notepad Leads)",
      description: "Cross-platform, zero-install, always up-to-date. Explore the rise of PWA-style notepads and why Memo Notepad sets the standard.",
      url: "/browser-based-note-taking-future"
    },
    {
      id: 5,
      title: "Pro Tips & Keyboard Shortcuts to 10x Your Note-Taking Speed",
      description: "Master Ctrl+N, Ctrl+S, find-in-page, and advanced navigation tricks. Become a power user of your memo notepad online.",
      url: "/shortcuts-speed-tips"
    },
    {
      id: 6,
      title: "How to Back Up and Restore Your Memos Across Devices and Browsers",
      description: "Step-by-step guide: export JSON, import on another device, sync manually and keep your memo collection safe forever.",
      url: "/backup-restore-memos"
    },
    {
      id: 7,
      title: "Memo Notepad vs Popular Note Apps: Privacy, Speed, and Simplicity Showdown",
      description: "Comparing Evernote, Google Keep, and Apple Notes — why a lightweight memo pad wins for instant capture and zero distractions.",
      url: "/memo-notepad-vs-others"
    },
    {
      id: 8,
      title: "Capture Ideas Instantly: Building a Second Brain with Memo Notepad",
      description: "Use the PARA method inside your memo notepad: organize projects, areas, resources, and archives using simple tags and pinning.",
      url: "/second-brain-memo-method"
    },
    {
      id: 9,
      title: "Mobile Note-Taking Done Right: Using Memo Notepad on Phones and Tablets",
      description: "Optimized touch controls, responsive layout, and offline capabilities — perfect for notes on the go without heavy apps.",
      url: "/mobile-note-taking-memo"
    },
    {
      id: 10,
      title: "From Scratch to Polish: Writing, Editing, and Exporting Perfect Memos",
      description: "Learn to craft clean memos, use the built-in word counter, export polished text, and format notes like a pro.",
      url: "/writing-editing-exporting"
    }
  ];

  // Pagination variables
  let currentPage = 1;
  const itemsPerPage = 6;   // show 6 articles per page for balanced layout

  function renderArticles() {
    const container = document.getElementById('articlesContainer');
    if (!container) return;
    
    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const pageArticles = articlesData.slice(startIndex, endIndex);
    
    if (pageArticles.length === 0 && currentPage > 1) {
      // edge: if last page empty, go to previous page
      currentPage = Math.max(1, Math.ceil(articlesData.length / itemsPerPage));
      return renderArticles();
    }
    
    container.innerHTML = '';
    
    pageArticles.forEach((article, idx) => {
      const card = document.createElement('article');
      card.className = 'article-card';
      card.setAttribute('data-id', article.id);
      
      // subtle fade-in animation
      card.style.opacity = '0';
      card.style.transform = 'translateY(16px)';
      card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      
      const globalIndex = startIndex + idx;
      const articleNumber = (globalIndex + 1).toString().padStart(2, '0');
      
      card.innerHTML = `
        <div class="card-content">
          <span class="article-number">📄 Article ${articleNumber}</span>
          <h2 class="article-title">${escapeHtml(article.title)}</h2>
          <p class="article-description">${escapeHtml(article.description)}</p>
          <a href="${article.url}" class="read-link" target="_blank" rel="noopener noreferrer">Read full article</a>
        </div>
      `;
      container.appendChild(card);
      
      // trigger animation after dom insertion
      requestAnimationFrame(() => {
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      });
    });
    
    // if no articles show empty state (should not happen)
    if (pageArticles.length === 0) {
      container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 80px; background: var(--paper); border-radius: var(--radius);">
        <span class="empty-icon">📭</span><p>No articles found. Check back soon!</p>
      </div>`;
    }
    
    renderPaginationControls();
  }
  
  function renderPaginationControls() {
    const paginationDiv = document.getElementById('paginationControls');
    if (!paginationDiv) return;
    
    const totalPages = Math.ceil(articlesData.length / itemsPerPage);
    if (totalPages <= 1) {
      paginationDiv.innerHTML = '';
      return;
    }
    
    const prevDisabled = currentPage === 1 ? 'disabled' : '';
    const nextDisabled = currentPage === totalPages ? 'disabled' : '';
    
    paginationDiv.innerHTML = `
      <button class="page-btn ${prevDisabled}" id="prevPageBtn" ${prevDisabled ? 'disabled' : ''}>← Previous</button>
      <span style="font-family: var(--font-ui); color: var(--ink-muted); align-self:center;">Page ${currentPage} of ${totalPages}</span>
      <button class="page-btn ${nextDisabled}" id="nextPageBtn" ${nextDisabled ? 'disabled' : ''}>Next →</button>
    `;
    
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    if (prevBtn && !prevBtn.disabled) {
      prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          renderArticles();
          window.scrollTo({ top: 380, behavior: 'smooth' });
        }
      });
    }
    if (nextBtn && !nextBtn.disabled) {
      nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
          currentPage++;
          renderArticles();
          window.scrollTo({ top: 380, behavior: 'smooth' });
        }
      });
    }
  }
  
  // simple XSS protection
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  
  // Mobile menu toggle
  function initMobileMenu() {
    const toggleBtn = document.getElementById('mobileToggle');
    const navLinks = document.getElementById('navLinks');
    if (toggleBtn && navLinks) {
      toggleBtn.addEventListener('click', () => {
        if (navLinks.style.display === 'flex') {
          navLinks.style.display = 'none';
        } else {
          navLinks.style.display = 'flex';
          navLinks.style.flexDirection = 'column';
          navLinks.style.position = 'absolute';
          navLinks.style.top = 'var(--header-h)';
          navLinks.style.left = '0';
          navLinks.style.right = '0';
          navLinks.style.backgroundColor = 'var(--cream)';
          navLinks.style.padding = '20px';
          navLinks.style.borderBottom = '2px solid var(--border)';
          navLinks.style.gap = '12px';
          navLinks.style.zIndex = '999';
        }
      });
      
      window.addEventListener('resize', () => {
        if (window.innerWidth > 780 && navLinks.style.display === 'flex') {
          navLinks.style.display = '';
          navLinks.style.position = '';
          navLinks.style.backgroundColor = '';
          navLinks.style.padding = '';
          navLinks.style.flexDirection = '';
        }
      });
    }
  }
  
  // optional: additional search/filter but we stick to clean blog listing
  // also dynamic URL reading to highlight active menu
  
  // Helper: highlight current active nav based on url
  function setActiveNav() {
    const currentPath = window.location.pathname;
    const links = document.querySelectorAll('.nav-link');
    links.forEach(link => {
      const href = link.getAttribute('href');
      if (href === '/blog' && currentPath.includes('blog')) {
        link.classList.add('active');
      } else if (href === '/' && (currentPath === '/' || currentPath === '/index')) {
        link.classList.add('active');
      } else if (!currentPath.includes('blog') && href !== '/blog' && href !== '/' && currentPath !== '/') {
        // optional keep default
      } else if (href === '/blog' && !currentPath.includes('blog')) {
        link.classList.remove('active');
      }
    });
  }
  
  // SEARCH/READ MORE TRACKING (no extra needed)
  function attachGlobalReadEvents() {
    // dynamic because container re-renders, but we use event delegation on container
    const container = document.getElementById('articlesContainer');
    if (container) {
      container.addEventListener('click', (e) => {
        const readLink = e.target.closest('.read-link');
        if (readLink && readLink.href) {
          // optional analytics or just let default behavior happen (new tab)
          // we don't prevent default
          console.log(`Blog article clicked: ${readLink.href}`);
        }
      });
    }
  }
  
  // initial page load
  document.addEventListener('DOMContentLoaded', () => {
    renderArticles();
    initMobileMenu();
    setActiveNav();
    attachGlobalReadEvents();
    
    // Also adjust any active state for the header (if any extra)
    const headerScrolled = () => {
      const header = document.querySelector('.site-header');
      if (window.scrollY > 20) {
        header.style.boxShadow = 'var(--shadow-sm)';
      } else {
        header.style.boxShadow = 'none';
      }
    };
    window.addEventListener('scroll', headerScrolled);
    headerScrolled();
  });
  
  // optional: manual friendly fallback for external article urls (they are dummy urls but consistent with the blog architecture)
  // all read links open in new tab, user friendly
</script>

</body>
</html>

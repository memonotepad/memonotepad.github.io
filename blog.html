      --ink-muted: #9e9080;
      --amber: #f0a500;
      --amber-light: #fcd270;
      --amber-pale: #fff7e0;
      --teal: #2a8f7f;
      --teal-light: #4cbaa8;
      --teal-pale: #e0f5f2;
      --coral: #e05c3a;
      --border: #e8dfc8;
      --border-dark: #d0c4a8;
      --shadow-sm: 0 2px 8px rgba(44,36,22,.07);
      --shadow-md: 0 4px 20px rgba(44,36,22,.12);
      --shadow-lg: 0 8px 40px rgba(44,36,22,.16);

      --radius-sm: 8px;

      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Serif 4', 'Georgia', serif;
      --font-ui: 'DM Sans', system-ui, sans-serif;

      --header-h: 64px;
      --transition: 200ms ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

      font-family: var(--font-body);
      background: var(--cream);
      color: var(--ink);
      line-height: 1.65;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(200,190,160,.12) 27px, rgba(200,190,160,.12) 28px);
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }
    
    /* header / footer */
    #site-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);

      border-bottom: 1px solid var(--border);

      color: var(--ink);
      text-decoration: none;
    }
    .nav-links {

      margin-left: auto;
    }
    .nav-link {
      font-family: var(--font-ui); font-size: .9rem;
      padding: 6px 12px; border-radius: 8px;
      color: var(--ink-light);
      text-decoration: none;
      transition: all var(--transition);

    .nav-link:hover, .nav-link.active { background: var(--amber-pale); color: var(--ink); }

    .nav-toggle { display: none; background: none; font-size: 1.8rem; border: none; cursor: pointer; margin-left: auto; color: var(--ink); }
    
    /* blog header */

      text-align: center;
      background: linear-gradient(135deg, var(--teal-pale) 0%, var(--amber-pale) 100%);

      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }

  </style>
</head>

    // Helper: escape HTML for safety
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Render cards with navigation that goes to dedicated article page (not popup)
    function renderBlogCards(posts, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      if (posts.length === 0) {
        container.innerHTML = `<div class="no-results">✨ No matching articles found. Try another keyword or browse all topics! ✨</div>`;
        return;
      }

      container.innerHTML = posts.map(post => {
        let categoryAccent = '#2a8f7f';
        if (post.categories.includes('privacy')) categoryAccent = '#3a8fd4';
        if (post.categories.includes('productivity')) categoryAccent = '#e05c3a';
        if (post.categories.includes('tips')) categoryAccent = '#f0a500';
        if (post.categories.includes('compare')) categoryAccent = '#9b6b9e';
        if (post.categories.includes('mobile')) categoryAccent = '#2a8f7f';
        
        const catLabels = post.categories.map(c => {
          if (c === 'privacy') return '🔒 Privacy';
          if (c === 'productivity') return '⚡ Productivity';
          if (c === 'tips') return '💡 Tips';
          if (c === 'compare') return '📊 Comparison';
          if (c === 'mobile') return '📱 Mobile';
          return c;
        }).join(' · ');
        
        // navigation to a dedicated article page with URL parameter
        return `
          
        `;
      }).join('');
    }

    // Filter & Search logic
    let currentFilter = 'all';
    let currentSearch = '';

    function filterAndRender() {
      let filtered = BLOG_POSTS.filter(post => {
        if (currentFilter !== 'all' && !post.categories.includes(currentFilter)) return false;
        if (currentSearch.trim() !== '') {
          const term = currentSearch.toLowerCase();
          return post.title.toLowerCase().includes(term) || post.excerpt.toLowerCase().includes(term);
        }
        return true;
      });
      renderBlogCards(filtered, 'blogCardsContainer');
    }

    function initInteractions() {
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          filterAndRender();
        });
      });
      const searchInput = document.getElementById('blogSearchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          currentSearch = e.target.value;
          filterAndRender();
        });
      }
    }

    // Mobile header toggle
    function initMobileHeader() {
      const toggleBtn = document.getElementById('navToggleBtn');
      const navLinks = document.getElementById('navLinks');
      if (toggleBtn && navLinks) {
        toggleBtn.addEventListener('click', () => {
          navLinks.classList.toggle('open');
        });
        window.addEventListener('resize', () => {
          if (window.innerWidth > 700) {
            navLinks.classList.remove('open');
          }
        });
      }
    }

    // On page load, render all cards
    renderBlogCards(BLOG_POSTS, 'blogCardsContainer');
    initInteractions();
    initMobileHeader();

    window.addEventListener('scroll', () => {
      const header = document.getElementById('site-header');
      if (window.scrollY > 20) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
  </script>
</body>
</html>
